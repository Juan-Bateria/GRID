<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <script src="js/bootstrap.min.js"></script>
        <title>GRID</title>
    </head>
    <body>
        <div class="container">
            <div class="row mt-3">
                <div class="col">
                    <div class="carousel slide carousel-fade" id="mycarousel" data-bs-ride="carousel">
                        <div class="carousel-inner">
                            <div class="carousel-item active" data-bs-interval="3000">
                                <div class="carousel-caption">
                                    <h5>Programacion Web 2023</h5>
                                    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eius, vero mollitia magnam sapiente quaerat cumque praesentium deserunt deleniti consectetur possimus delectus, sint commodi ratione nobis, rerum, rem libero molestiae facere!</p>
                                </div>
                                <img class="img-fluid" src="img/carousel1.jpg" alt="">
                            </div>
                            <div class="carousel-item" data-bs-interval="3000">
                                <img class="img-fluid" src="img/carousel2.jpg" alt="">
                            </div>
                            <div class="carousel-item" data-bs-interval="3000">
                                <img class="img-fluid" src="img/carousel3.jpg" alt="">
                            </div>
                        </div>
 
                        <!-- Controles -->
                        <button
                            class="carousel-control-prev"
                            type="button"
                            data-bs-target="#mycarousel"
                            data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Anterior</span>
                        </button>
 
                        <button
                            class="carousel-control-next"
                            type="button"
                            data-bs-target="#mycarousel"
                            data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Siguiente</span>
                        </button>
 
                        <!-- Indicadores -->
                        <div class="carousel-indicators">
                            <button
                                type="button"
                                class="active"
                                data-bs-target="#mycarousel"
                                data-bs-slide-to="0"
                                aria-label="Slide 1">
                            </button>
                            <button
                                type="button"
                                class="active"
                                data-bs-target="#mycarousel"
                                data-bs-slide-to="1"
                                aria-label="Slide 2">
                            </button>
                            <button
                                type="button"
                                class="active"
                                data-bs-target="#mycarousel"
                                data-bs-slide-to="2"
                                aria-label="Slide 3">
                            </button>
                        </div>
 
 
 
                    </div>
                </div>
   
            </div>
           
        </div>
    </body>
    </html>
